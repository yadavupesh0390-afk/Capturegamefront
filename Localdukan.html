// Utility
function formatDT(d){ const dt=new Date(d); return dt.toLocaleDateString()+" "+dt.toLocaleTimeString(); }
// ================= LOCATION NORMALIZER =================
function normalizeLocation(loc) {
  if (!loc) return null;

  if (loc.lat && loc.lng) {
    return { lat: Number(loc.lat), lng: Number(loc.lng) };
  }

  if (loc.latitude && loc.longitude) {
    return { lat: Number(loc.latitude), lng: Number(loc.longitude) };
  }

  return null;
}

// ================= RETAILER LOCATION ENSURE =================
async function ensureRetailerLocation() {
  const profile = JSON.parse(localStorage.getItem("retailerProfile") || "{}");

  // ✅ localStorage me already hai
  const loc = normalizeLocation(profile.location);
  if (loc) {
    localStorage.setItem("retailer_location", JSON.stringify(loc));
    return loc;
  }

  // 🔥 backend se laao
  const retailerId = localStorage.getItem("userId");
  if (!retailerId) return null;

  try {
    const res = await fetch(`${API}/api/retailers/profile/${retailerId}`);
    const data = await res.json();

    const serverLoc = normalizeLocation(data?.profile?.location);
    if (serverLoc) {
      localStorage.setItem("retailer_location", JSON.stringify(serverLoc));
      localStorage.setItem(
        "retailerProfile",
        JSON.stringify(data.profile)
      );
      return serverLoc;
    }
  } catch (e) {
    console.error("❌ ensureRetailerLocation failed", e);
  }

  return null;
  }
// ------------------- PRODUCTS -------------------

  let wid = document.getElementById("wid").value.trim();

  try {

    let allProducts = [];

    // ✅ CASE 1: No manual wid → nearest wholesalers
    if (!wid) {

      const retailerLoc = await ensureRetailerLocation();

      if (!retailerLoc) {
        alert("📍 Please set your location first.");
        return;
      }

      const nearRes = await fetch(`${API}/api/wholesalers/nearest`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          location: {
            lat: retailerLoc.lat,
            lng: retailerLoc.lng
          }
        })
      });

      const nearData = await nearRes.json();

      if (
        !nearData.success ||
        !nearData.wholesalers ||
        nearData.wholesalers.length === 0
      ) {
        document.getElementById("categories").innerHTML =
          "<p>No wholesaler found</p>";
        return;
      }

      // ✅ Merge products of all nearby wholesalers
      for (const w of nearData.wholesalers) {

        const res = await fetch(
          `${API}/api/products/wholesaler/${w._id}`
        );

        const data = await res.json();

        if (data.success && data.products) {
          allProducts.push(...data.products);
        }
      }

      // ✅ Save all nearby products
      sessionStorage.setItem(
        "nearbyProducts",
        JSON.stringify(allProducts)
      );

    }

    // ✅ CASE 2: Manual Wholesaler ID
    else {

      if (
        currentWholesalerId &&
        currentWholesalerId !== wid
      ) {
        clearCartCompletely();
      }

      currentWholesalerId = wid;

      const res = await fetch(
        `${API}/api/products/wholesaler/${wid}`
      );

      const data = await res.json();

      if (data.success && data.products) {
        allProducts = data.products;
      }

      // ✅ Save manual wholesaler products also
      sessionStorage.setItem(
        "nearbyProducts",
        JSON.stringify(allProducts)
      );
    }

    const categoriesContainer =
      document.getElementById("categories");

    if (!allProducts.length) {
      categoriesContainer.innerHTML =
        "<p>No Products Found</p>";
      return;
    }

    // ✅ Build Categories
    const categoryMap = {};

    allProducts.forEach(p => {
      const cat = (p.category || "Other").trim();

      if (!categoryMap[cat]) {
        categoryMap[cat] = true;
      }
    });

    // ✅ Render Categories
    categoriesContainer.innerHTML = Object.keys(categoryMap)
      .map(cat => `
        <div class="category-card"
             onclick="openCategory('${encodeURIComponent(cat)}')">

          <div class="category-icon">
            <i class="bi bi-box-seam"></i>
          </div>

          <div class="category-name">
            ${cat}
          </div>

        </div>
      `)
      .join("");

    sessionStorage.setItem(
      "lastCategoriesHTML",
      categoriesContainer.innerHTML
    );

  } catch (err) {

    console.error("Load Products Error:", err);
    alert("Failed to load products");

  }
}

function normalizeSetAt(setAt) {
  if (!setAt) return null;

  // already number (milliseconds)
  if (typeof setAt === "number" && !isNaN(setAt)) {
    return setAt;
  }

  // number as string
  if (typeof setAt === "string" && !isNaN(setAt)) {
    return Number(setAt);
  }

  // ISO date string
  const parsed = Date.parse(setAt);
  if (!isNaN(parsed)) {
    return parsed;
  }

  return null;
}

  let locationTimerInterval = null;

function updateLocationTimer(setAt, locked) {

  const timerEl = document.getElementById("locationTimer");
  if (!timerEl) return;

  const LIMIT = 10 * 60 * 60 * 1000; // 10 hours

  // ✅ normalize date
  const normalizedSetAt = normalizeSetAt(setAt);

  if (!normalizedSetAt) {
    timerEl.innerText = "";
    return;
  }

  if (locationTimerInterval) {
    clearInterval(locationTimerInterval);
  }

  function tick() {
    const diff = (normalizedSetAt + LIMIT) - Date.now();

    if (diff <= 0 || locked === true) {

      timerEl.innerText =
        "🔒 Location lock ho chuki hai. Correction ke liye admin se contact karein.";

      // 🔒 Disable set location button
      const btn = document.querySelector(
        "#profileModal .location-group button"
      );

      if (btn) {
        btn.disabled = true;
        btn.innerText = "🔒 Location Locked";
        btn.style.background = "#9ca3af";
        btn.style.cursor = "not-allowed";
      }

      // 🆘 SHOW ADMIN HELP
      const helpBtn = document.getElementById("adminHelpBtn");
      if (helpBtn) helpBtn.style.display = "block";

      clearInterval(locationTimerInterval);
      return;
    }

    const hrs  = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    timerEl.innerText =
      `⏳ ${hrs}h ${mins}m ${secs}s remaining\n` +
      `Iske baad location lock ho jayegi.`;

    // ❌ hide admin help while time left
    const helpBtn = document.getElementById("adminHelpBtn");
    if (helpBtn) helpBtn.style.display = "none";
  }

  tick();
  locationTimerInterval = setInterval(tick, 1000);
}

/* ================= GET RETAILER LOCATION ================= */
async function getRetailerLocation() {

  if (!navigator.geolocation) {
    alert("❌ Geolocation supported nahi hai");
    return;
  }

  profileLocation.value = "📡 Fetching location...";

  navigator.geolocation.getCurrentPosition(
    async (pos) => {

      const location = {
        lat: Number(pos.coords.latitude),
        lng: Number(pos.coords.longitude)
      };

      try {
        const res = await fetch(`${API}/api/retailers/saveProfile`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            retailerId: localStorage.getItem("userId"),
            location: location
          })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          profileLocation.value = "";
          alert(data.message || "❌ Location save failed");
          return;
        }

        // ✅ UI update (server-confirmed)
        if (data.profile?.location) {
          profileLocation.value =
            data.profile.location.lat.toFixed(6) + ", " +
            data.profile.location.lng.toFixed(6);
        }

        // ✅ LocalStorage sync (optional, but safe)
        localStorage.setItem(
          "retailerProfile",
          JSON.stringify(data.profile)
        );

        alert("📍 Location saved successfully ✅");

        // 🔥 🔥 🔥 IMPORTANT FIX
        // ❌ Date.now() use nahi karna
        // ✅ Timer hamesha SERVER ke setAt se chalega
        if (data.profile?.location?.setAt) {
          updateLocationTimer(
            data.profile.location.setAt,
            data.profile.location.locked === true
          );
        }

      } catch (err) {
        console.error("❌ Location save error", err);
        profileLocation.value = "";
        alert("❌ Server error");
      }
    },
    () => {
      profileLocation.value = "";
      alert("❌ Location permission denied");
    },
    {
      enableHighAccuracy: true,
      timeout: 10000
    }
  );
}

      `${API}/api/delivery/calculate`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          orderAmount: subtotal,
          vehicleType: vehicle,
          retailerLocation: retailerLoc,
          wholesalerLocation: wholesalerLoc
        })
      }
    );

    const data = await res.json();

    if (!data.success) {
      box.style.display = "block";
      dText.innerText = "⚠️ Delivery calculation failed";
      tText.innerText = "";
      return;
    }

    

/* 🔁 DOUBLE distance & time */    
const doubleDistance = (Number(data.distanceKm) * 2).toFixed(2);    
const doubleTime = Math.round(Number(data.timeMinutes) * 2);    
const total = subtotal + Number(data.retailerPays);    

/* ================= UI UPDATE ================= */    
box.style.display = "block";

dText.innerText =
  `🚚 Delivery ₹${data.totalDelivery} ` +
  `(Retailer Pays ₹${data.retailerPays}, ${data.retailerPercent}%)\n` +
  `⏱️ ${doubleTime} min\n` +
  `📍 टोटल आने-जाने का = ${doubleDistance} km`;

tText.innerText = `💰 Total ₹${total}`;

/* ================= STORE FOR PAYMENT ================= */
window.__cartDelivery = {
  subtotal,
  retailerPays: Number(data.retailerPays),
  wholesalerPays: Number(data.wholesalerPays || 0),
  total,
  distanceKm: doubleDistance,
  timeMinutes: doubleTime
};

} catch (err) {
  console.error("Cart delivery error", err);
  box.style.display = "block";
  dText.innerText = "⚠️ Server error";
  tText.innerText = "";
}
}


/* ================= ADD TO CART ================= */
async function addToCart(p) {
  const retailerId = localStorage.getItem("userId");

  if (!retailerId) {
    alert("🔐 Please login first");
    return;
  }

  try {
    const res = await fetch(`${API}/api/cart/save`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        retailerId,
        item: {
          productId: p._id,
          productName: p.productName,
          price: p.price,
          image: p.images?.[0] || "",
          wholesalerId: p.wholesalerId,
          shopName: p.shopName,
          mobile: p.mobile,
          address: p.address
        }
      })
    });

    const data = await res.json();

    /* ❌ DIFFERENT WHOLESALER FOUND */
    if (
      !data.success &&
      data.message &&
      data.message.includes("Only one wholesaler")
    ) {
      // Backend cart clear
      await fetch(`${API}/api/cart/clear/${retailerId}`, {
        method: "DELETE"
      });

      // Frontend cart clear
      cart = [];
      localStorage.removeItem("cart");
      currentWholesalerId = null;

      alert(
        "🧹 पुराना cart clear कर दिया गया है.\nअब नया product add ho raha hai."
      );

      // Re-add product
      addToCart(p);
      return;
    }

    if (data.success) {
      cart.push(p);
      currentWholesalerId = p.wholesalerId;
      localStorage.setItem("cart", JSON.stringify(cart));

      alert(
        "🛒 Added to cart successfully ✅\n\n" +
        "Product: " + p.productName +
        "\nPrice: ₹" + p.price
      );
    } else {
      alert("❌ Failed to add item");
    }

  } catch (err) {
    console.error(err);
    alert("❌ Server error");
  }
}


async function loadCart() {

  const retailerId = localStorage.getItem("userId");
  const cartDiv = document.getElementById("cartItems");

  /* ---------- LOGIN CHECK ---------- */
  if (!retailerId) {
    cartDiv.innerHTML =
      "<p style='text-align:center'>🔐 Please login</p>";
    cart = [];
    return;
  }

  try {
    /* ---------- FETCH CART ---------- */
    const res = await fetch(`${API}/api/cart/${retailerId}`);
    const data = await res.json();

    if (!data.items || !data.items.length) {
      cartDiv.innerHTML =
        "<p style='text-align:center'>🛒 Cart is empty</p>";
      cart = [];
      return;
    }

    /* ---------- CURRENT WHOLESALER FILTER ---------- */
    const currentWholesalerId =
      new URLSearchParams(window.location.search).get("wid") ||
      localStorage.getItem("currentWholesalerId");

    const filteredItems = currentWholesalerId
      ? data.items.filter(
          item => item.wholesalerId === currentWholesalerId
        )
      : data.items;

    if (!filteredItems.length) {
      cartDiv.innerHTML =
        "<p style='text-align:center'>🛒 Is wholesaler ka cart empty hai</p>";
      cart = [];
      return;
    }

    /* ---------- RENDER CART ---------- */
    cartDiv.innerHTML = filteredItems.map(item => `
      <div class="cart-card"
           style="display:flex;gap:10px;align-items:center;
                  padding:8px;border-bottom:1px solid #eee">

        <img src="${item.image || ''}"
             class="cart-img"
             style="width:60px;height:60px;object-fit:contain;
                    border-radius:8px;background:#f8fafc">

        <div class="cart-info" style="flex:1">
          <div class="cart-name" style="font-weight:600">
            ${item.productName}
          </div>

          <div class="cart-price"
               style="font-size:14px;color:#334155">
            ₹${item.price} × ${item.quantity || 1} =
            <b>₹${Number(item.price) * Number(item.quantity || 1)}</b>
          </div>
        </div>

        <div class="cart-actions">
          <button
            onclick="removeFromCart('${item.productId}')"
            style="border:none;background:#fee2e2;color:#991b1b;
                   border-radius:6px;padding:4px 8px;cursor:pointer">
            ❌
          </button>
        </div>

      </div>
    `).join("");

    /* ---------- LOCAL CART SYNC (IMPORTANT) ---------- */
    cart = filteredItems.map(item => ({
      ...item,
      quantity: Number(item.quantity || 1),
      price: Number(item.price)
    }));

    /* ---------- DELIVERY RECALC ---------- */
    calcCartDelivery();

  } catch (err) {
    console.error("❌ loadCart error", err);
    cartDiv.innerHTML =
      "<p style='text-align:center'>⚠️ Cart load failed</p>";
    cart = [];
  }
}

/* ================= REMOVE (LOCAL – OPTIONAL) ================= */
/* ⚠️ Agar backend cart use ho raha hai to isko use na karein */
async function removeCart(index) {
  cart.splice(index, 1);

  try {
    await fetch(`${API}/api/cart/save`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        retailerId: localStorage.getItem("userId"),
        items: cart
      })
    });

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();

  } catch (e) {
    alert("❌ Failed to remove item");
  }
}


/* ================= REMOVE FROM CART (BACKEND) ================= */
async function removeFromCart(productId) {
  const retailerId = localStorage.getItem("userId");
  if (!retailerId) return;

  try {
    const res = await fetch(`${API}/api/cart/remove`, {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ retailerId, productId })
    });

    const data = await res.json();

    if (data.success) {
      loadCart(); // 🔄 refresh
    } else {
      alert(data.message || "❌ Failed to remove item");
    }

  } catch (err) {
    console.error("REMOVE CART ERROR:", err);
    alert("❌ Server error");
  }
}

      deliveryData.innerHTML =

      return `

            </span>
          </div>

          <div class="delivery-code">
            ${
              o.deliveryCode

/* ================= ORDER STATUS ================= */
async function openOrderStatus() {

  orderStatusModal.style.display = "flex";

  const profile =
    JSON.parse(localStorage.getItem("retailerProfile") || "{}");

  if (!profile.mobile) {
    orderStatusData.innerHTML = "⚠️ Profile not found";
    return;
  }

  try {
    const res = await fetch(
      `${API}/api/orders/retailer/${profile.mobile}`
    );
    const data = await res.json();

    if (!data.orders || !data.orders.length) {
      orderStatusData.innerHTML =
        "<p style='text-align:center;color:#666'>No orders found</p>";
      return;
    }

    orderStatusData.innerHTML = data.orders.map(o => {

      const d = new Date(o.updatedAt || o.createdAt);

      let cls = "status-pending";
      if (o.status.includes("confirmed")) cls = "status-confirmed";
      else if (o.status.includes("delivery")) cls = "status-delivery";
      else if (o.status === "delivered") cls = "status-delivered";

      return `
        <div class="status-card">
          <div class="status-product">${o.productName || "-"}</div>
          <div class="status-badge ${cls}">
            ${o.status.replaceAll("_", " ").toUpperCase()}
          </div>
          <div class="status-time">
            🕒 ${d.toLocaleDateString("en-IN")}
            ${d.toLocaleTimeString("en-IN")}
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    console.error("Order status error", err);
    orderStatusData.innerHTML = "❌ Failed to load orders";
  }
}

async function openRetailerProfile() {

  profileModal.style.display = "flex";

  const retailerId = localStorage.getItem("userId");
  if (!retailerId) {
    alert("🔐 Login required");
    return;
  }

  try {
    const res = await fetch(
      `${API}/api/retailers/profile/${retailerId}`
    );

    const data = await res.json();

    if (data.success && data.profile) {

      /* ===== BASIC PROFILE ===== */
      profileName.value   = data.profile.name || "";
      profileMobile.value = data.profile.mobile || "";

      /* ===== LOCATION (ONLY SERVER DATA) ===== */
      if (
        data.profile.location?.lat &&
        data.profile.location?.lng
      ) {
        profileLocation.value =
          Number(data.profile.location.lat).toFixed(6) + ", " +
          Number(data.profile.location.lng).toFixed(6);
      } else {
        profileLocation.value = "";
      }

      /* ===== LOCATION TIMER (ONLY SERVER BASED) ===== */
      if (data.profile?.locationMeta?.firstSetAt) {
        updateLocationTimer(
          data.profile.locationMeta.firstSetAt,
          data.profile.locationMeta.locked
        );
      } else {
        const timerEl = document.getElementById("locationTimer");
        if (timerEl) timerEl.innerText = "";
      }

      /* ===== UI CACHE (OPTIONAL) ===== */
      localStorage.setItem(
        "retailerProfile",
        JSON.stringify(data.profile)
      );

    } else {
      profileName.value = "";
      profileMobile.value = "";
      profileLocation.value = "";

      const timerEl = document.getElementById("locationTimer");
      if (timerEl) timerEl.innerText = "";
    }

  } catch (err) {
    console.error("REAL ERROR 👉", err);
    alert("❌ Server error");
  }
}

/* ================= SAVE PROFILE ================= */
async function saveProfile() {

  if (!profileName.value.trim() || !profileMobile.value.trim()) {
  alert("👤 Name aur Mobile dono required hain");
  return;
}

  // 🔍 profile meta check
  const retailerProfile =
    JSON.parse(localStorage.getItem("retailerProfile") || "{}");

  const locationMeta = retailerProfile.locationMeta || {};
  const isLocked = locationMeta.locked === true;

  let location; // ❗ undefined by default

  // ✅ LOCATION SIRF TAB BHEJO JAB LOCK NA HO
  if (!isLocked) {
    const locLS = localStorage.getItem("retailer_location");

    if (locLS) {
      try {
        const loc = JSON.parse(locLS);

        if (!isNaN(loc.lat) && !isNaN(loc.lng)) {
          location = {
            lat: Number(loc.lat),
            lng: Number(loc.lng)
          };
        }
      } catch (e) {
        console.warn("Invalid location data");
      }
    }
  }

  // 📦 BASIC PROFILE PAYLOAD
  const payload = {
    retailerId: localStorage.getItem("userId"),
    name: profileName.value.trim(),
    mobile: profileMobile.value.trim()
  };

  // ❗ location only if allowed
  if (location) {
    payload.location = location;
  }

  sendProfile(payload);
}
// ✅ Helper function to send profile to server
/* ================= SEND / SAVE PROFILE ================= */
async function sendProfile(payload) {
  try {
    const res = await fetch(`${API}/api/retailers/saveProfile`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.success) {

  // ❌ yahan incomplete profile save ho rahi hai
  localStorage.setItem(
    "retailerProfile",
    JSON.stringify(data.profile)
  );

      /* ================= LOCATION FIX ================= */
      const locationUpdated = localStorage.getItem("location_updated");

      if (locationUpdated === "yes") {
        // ✅ User set new location → keep local
        console.log("📍 New location preserved (local)");
      } else {
        // ✅ User didn't set new location → use server
        if (data.profile.location?.lat && data.profile.location?.lng) {
          localStorage.setItem(
            "retailer_location",
            JSON.stringify({
              lat: Number(data.profile.location.lat),
              lng: Number(data.profile.location.lng)
            })
          );
        } else {
          localStorage.removeItem("retailer_location");
        }
      }

      // ✅ Clear flag
      localStorage.removeItem("location_updated");

      alert("✅ Profile save ho gaya");
      closeAll();

    } else {
      alert(data.message || "❌ Save failed");
    }

  } catch (err) {
    console.error("SaveProfile Error:", err);
    alert("❌ Server error");
  }
}
